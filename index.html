<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirNetwork 平台架构拓扑图</title>
  <style>
    :root {
      --bg: #030814;
      --bg-deep: #061326;
      --border: #38a7d8;
      --text: #bfe8ff;
      --title: #d7f4ff;
      --line: #45c4ff;
      --line-active: #00ffd0;
      --infra: #0f2235;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 18% 10%, rgba(24, 138, 255, 0.16) 0%, transparent 35%),
        radial-gradient(circle at 88% 90%, rgba(0, 255, 208, 0.12) 0%, transparent 40%),
        linear-gradient(130deg, var(--bg) 0%, var(--bg-deep) 55%, #02060f 100%);
      color: var(--text);
      font-family: "Bahnschrift", "DIN Alternate", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 14px;
    }

    .canvas-wrap {
      width: min(1600px, 100%);
      border: 1px solid rgba(88, 210, 255, 0.72);
      background:
        linear-gradient(180deg, rgba(0, 24, 48, 0.65), rgba(2, 11, 22, 0.82)),
        repeating-linear-gradient(
          -45deg,
          rgba(130, 218, 255, 0.03),
          rgba(130, 218, 255, 0.03) 16px,
          rgba(0, 0, 0, 0.02) 16px,
          rgba(0, 0, 0, 0.02) 32px
        );
      box-shadow:
        0 0 0 1px rgba(75, 182, 255, 0.24),
        0 0 28px rgba(8, 123, 197, 0.45),
        inset 0 0 34px rgba(12, 88, 147, 0.35);
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .panel {
      fill: rgba(16, 39, 62, 0.38);
      stroke: rgba(69, 196, 255, 0.75);
      stroke-width: 1.2;
    }

    .service {
      stroke: #71d7ff;
      stroke-width: 1.15;
      filter: drop-shadow(0 0 7px rgba(54, 194, 255, 0.35));
    }

    .service-inner {
      fill: rgba(6, 27, 44, 0.42);
      stroke: rgba(123, 223, 255, 0.46);
      stroke-width: 0.9;
    }

    .service-topbar {
      fill: rgba(59, 212, 255, 0.16);
      stroke: rgba(110, 223, 255, 0.4);
      stroke-width: 0.8;
    }

    .service-tag {
      fill: rgba(0, 255, 208, 0.14);
      stroke: rgba(0, 255, 208, 0.6);
      stroke-width: 0.8;
    }

    .service-tag-text {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      fill: #91ffea;
      text-shadow: 0 0 8px rgba(0, 255, 208, 0.45);
    }

    .svc-core { fill: url(#coreGrad); }
    .svc-gw { fill: url(#gwGrad); }
    .svc-edge { fill: url(#edgeGrad); }

    .infra {
      fill: var(--infra);
      stroke: rgba(137, 217, 255, 0.7);
      stroke-width: 1.1;
      stroke-dasharray: 7 4;
      filter: drop-shadow(0 0 6px rgba(53, 170, 255, 0.28));
    }

    .infra-inner {
      fill: rgba(8, 25, 39, 0.28);
      stroke: rgba(113, 205, 255, 0.42);
      stroke-width: 0.8;
      stroke-dasharray: 4 3;
    }

    .title {
      font-size: 17px;
      font-weight: 700;
      fill: var(--title);
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(91, 214, 255, 0.7);
    }

    .text {
      font-size: 14px;
      fill: #d5f3ff;
      font-weight: 600;
      text-shadow: 0 0 8px rgba(76, 175, 255, 0.28);
    }

    .svc-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.8px;
      fill: #ecfbff;
      text-shadow: 0 0 10px rgba(121, 225, 255, 0.65);
    }

    .svc-port {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.6px;
      fill: #84e1ff;
      text-shadow: 0 0 8px rgba(95, 202, 255, 0.55);
    }

    .svc-desc {
      font-size: 12px;
      font-weight: 600;
      fill: #b8ebff;
      text-shadow: 0 0 8px rgba(74, 174, 255, 0.32);
    }

    .svc-micro {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      fill: #63cbff;
    }

    .ext-title {
      font-size: 13px;
      font-weight: 700;
      fill: #d7f5ff;
      text-shadow: 0 0 8px rgba(97, 205, 255, 0.5);
    }

    .infra-title {
      font-size: 12px;
      font-weight: 700;
      fill: #dff6ff;
      text-shadow: 0 0 8px rgba(102, 206, 255, 0.35);
    }

    .infra-desc {
      font-size: 10px;
      font-weight: 600;
      fill: #96dcff;
    }

    .small {
      font-size: 12px;
      fill: #98dbff;
      font-weight: 600;
      text-shadow: 0 0 8px rgba(58, 145, 214, 0.25);
    }

    .line {
      stroke: var(--line);
      stroke-width: 1.45;
      fill: none;
      marker-end: url(#arrow);
      opacity: 0.95;
      filter: drop-shadow(0 0 4px rgba(74, 198, 255, 0.45));
    }

    .flow {
      stroke: var(--line-active);
      stroke-dasharray: 8 6;
      animation: stream 11s linear infinite;
      filter: drop-shadow(0 0 6px rgba(0, 255, 208, 0.65));
    }

    .line-soft {
      stroke: var(--line);
      stroke-width: 1.2;
      fill: none;
      opacity: 0.75;
      filter: drop-shadow(0 0 3px rgba(58, 184, 255, 0.4));
    }

    .chip {
      fill: #153247;
      stroke: #6db7e3;
      stroke-width: 1;
    }

    .metal-label {
      font-size: 13px;
      font-weight: 700;
      fill: #8ee6ff;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(60, 212, 255, 0.8);
    }

    .hud-corner {
      stroke: rgba(106, 224, 255, 0.85);
      stroke-width: 2;
      fill: none;
      filter: drop-shadow(0 0 6px rgba(74, 205, 255, 0.7));
    }

    .scan-sweep {
      opacity: 0.28;
    }

    .svc-core,
    .svc-gw {
      animation: breathe 7s ease-in-out infinite;
    }

    @keyframes stream {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -240; }
    }

    @keyframes breathe {
      0%, 100% { filter: drop-shadow(0 0 7px rgba(41, 180, 255, 0.28)); }
      50% { filter: drop-shadow(0 0 14px rgba(41, 180, 255, 0.55)); }
    }

    @media (max-width: 900px) {
      .page { padding: 4px; }
      .canvas-wrap { border-width: 1px; }
    }
  </style>
</head>
